services:
  gremlin-server:
    image: ${NEPTUNE_TINKER_IMAGE:-tinkerpop/gremlin-server:3.7.2}
    container_name: ${NEPTUNE_TINKER_CONTAINER:-neptune-tinker}
    ports:
      - "${NEPTUNE_TINKER_PORT:-8182}:8182"
    volumes:
      - ./gremlin-server.yaml:/opt/gremlin-server/custom-conf/gremlin-server.yaml:ro
      - ./tinkergraph.properties:/opt/gremlin-server/custom-conf/tinkergraph.properties:ro
      - ./neptune-init.groovy:/opt/gremlin-server/scripts/neptune-init.groovy:ro
      - neptune-tinker-data:/opt/gremlin-server/data
    environment:
      - NEPTUNE_TINKER_PERSIST=${NEPTUNE_TINKER_PERSIST:-true}
    entrypoint: >
      bash -c "cp /opt/gremlin-server/custom-conf/gremlin-server.yaml /opt/gremlin-server/conf/gremlin-server.yaml &&
      cp /opt/gremlin-server/custom-conf/tinkergraph.properties /opt/gremlin-server/conf/tinkergraph.properties &&
      if [ \"$$NEPTUNE_TINKER_PERSIST\" != 'true' ]; then
        sed -i '/graphLocation/d; /graphFormat/d' /opt/gremlin-server/conf/tinkergraph.properties;
      fi &&
      exec java -Dlogback.configurationFile=file:/opt/gremlin-server/conf/logback.xml
      -Xms512m -Xmx4096m
      -cp '/opt/gremlin-server/conf/:/opt/gremlin-server/lib/*:/opt/gremlin-server/ext/tinkergraph-gremlin/lib/*:/opt/gremlin-server/ext/gremlin-groovy/lib/*'
      org.apache.tinkerpop.gremlin.server.GremlinServer conf/gremlin-server.yaml"
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8182' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  gremlin-console:
    image: ${NEPTUNE_TINKER_CONSOLE_IMAGE:-tinkerpop/gremlin-console:3.7.2}
    container_name: ${NEPTUNE_TINKER_CONTAINER:-neptune-tinker}-console
    volumes:
      - ./remote-console.yaml:/opt/gremlin-console/conf/remote.yaml:ro
      - ./console-init.groovy:/opt/gremlin-console/scripts/init.groovy:ro
    command: ["-i", "scripts/init.groovy"]
    depends_on:
      gremlin-server:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - console

volumes:
  neptune-tinker-data:
