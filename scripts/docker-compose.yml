services:
  gremlin-server:
    image: ${NEPTUNE_TINKER_IMAGE:-tinkerpop/gremlin-server:3.7.2}
    container_name: ${NEPTUNE_TINKER_CONTAINER:-neptune-tinker}
    ports:
      - "${NEPTUNE_TINKER_PORT:-8182}:8182"
    volumes:
      - ./gremlin-server.yaml:/opt/gremlin-server/custom-conf/gremlin-server.yaml:ro
      - ./tinkergraph.properties:/opt/gremlin-server/custom-conf/tinkergraph.properties:ro
    entrypoint: >
      bash -c "cp /opt/gremlin-server/custom-conf/gremlin-server.yaml /opt/gremlin-server/conf/gremlin-server.yaml &&
      cp /opt/gremlin-server/custom-conf/tinkergraph.properties /opt/gremlin-server/conf/tinkergraph.properties &&
      /opt/gremlin-server/bin/gremlin-server.sh conf/gremlin-server.yaml"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/8182' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  gremlin-console:
    image: ${NEPTUNE_TINKER_IMAGE:-tinkerpop/gremlin-console:3.7.2}
    container_name: ${NEPTUNE_TINKER_CONTAINER:-neptune-tinker}-console
    volumes:
      - ./remote-console.yaml:/opt/gremlin-console/conf/remote.yaml:ro
      - ./console-init.groovy:/opt/gremlin-console/scripts/init.groovy:ro
    command: ["-i", "scripts/init.groovy"]
    depends_on:
      gremlin-server:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - console
