host: 0.0.0.0
port: 8182
evaluationTimeout: 30000
channelizer: org.apache.tinkerpop.gremlin.server.channel.WebSocketChannelizer
graphManager: org.apache.tinkerpop.gremlin.server.util.DefaultGraphManager

graphs:
  graph: conf/tinkergraph-empty.properties

scriptEngines:
  gremlin-lang: {}

serializers:
  - className: org.apache.tinkerpop.gremlin.util.ser.GraphBinaryMessageSerializerV4
  - className: org.apache.tinkerpop.gremlin.util.ser.GraphBinaryMessageSerializerV4
    config:
      serializeResultToString: true
  - className: org.apache.tinkerpop.gremlin.util.ser.GraphSONMessageSerializerV4
    config:
      ioRegistries: [org.apache.tinkerpop.gremlin.tinkergraph.structure.TinkerIoRegistryV3]

processors:
  - className: org.apache.tinkerpop.gremlin.server.op.traversal.TraversalOpProcessor
